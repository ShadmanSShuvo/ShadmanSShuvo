name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: ShadmanSShuvo
          UTC_OFFSET: 6
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN }}
